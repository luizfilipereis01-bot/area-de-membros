<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tutoriais — Concursa AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ─── Design Tokens ─────────────────────────────────────── */
    :root {
      --color-bg:          #2C2A27;   /* primary 60% – dark background */
      --color-surface:     #363330;   /* cards / panels */
      --color-surface-alt: #3F3C38;   /* hover surface */
      --color-border:      #4A4640;   /* subtle borders */
      --color-accent:      #F3E600;   /* yellow – 10% highlight */
      --color-accent-dark: #E1CD00;   /* yellow pressed */
      --color-text:        #F0EDE8;   /* primary text */
      --color-text-muted:  #9E9891;   /* secondary text */
      --color-text-dim:    #6E6259;   /* dimmed text */
      --color-overlay:     rgba(20, 18, 16, 0.75);

      --radius-sm:  8px;
      --radius-md:  12px;
      --radius-lg:  16px;
      --radius-xl:  24px;

      --shadow-card:  0 2px 8px rgba(0,0,0,.35);
      --shadow-modal: 0 24px 64px rgba(0,0,0,.6);

      --font: 'Inter', system-ui, sans-serif;
      --transition: 0.18s ease;
    }

    /* ─── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font);
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--color-accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }

    /* ─── Page Layout ────────────────────────────────────────── */
    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 48px 32px 80px;
    }

    /* ─── Page Title ─────────────────────────────────────────── */
    .page-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: 8px;
    }
    .page-heading {
      font-size: 32px;
      font-weight: 800;
      color: var(--color-text);
      margin-bottom: 48px;
      line-height: 1.15;
    }
    .page-heading span {
      color: var(--color-accent);
    }

    /* ─── Module Section ─────────────────────────────────────── */
    .module + .module { margin-top: 48px; }

    .module-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .module-badge {
      background: var(--color-accent);
      color: #1A1800;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .module-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--color-text);
    }
    .module-divider {
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }

    /* ─── Cards Grid ─────────────────────────────────────────── */
    .lessons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .lesson-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 20px;
      cursor: pointer;
      transition: transform var(--transition), background var(--transition), border-color var(--transition), box-shadow var(--transition);
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      overflow: hidden;
    }
    .lesson-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius-md);
      border: 2px solid transparent;
      transition: border-color var(--transition);
      pointer-events: none;
    }
    .lesson-card:hover {
      background: var(--color-surface-alt);
      transform: translateY(-2px);
      box-shadow: var(--shadow-card);
    }
    .lesson-card:hover::after {
      border-color: var(--color-accent);
    }
    .lesson-card:active { transform: translateY(0); }

    .card-icon-wrap {
      width: 44px;
      height: 44px;
      background: rgba(243, 230, 0, 0.12);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .card-icon-wrap svg {
      width: 22px;
      height: 22px;
      fill: var(--color-accent);
    }

    .card-body { flex: 1; }
    .card-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-text-dim);
      margin-bottom: 4px;
    }
    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text);
      line-height: 1.4;
    }

    .card-arrow {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(243, 230, 0, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      align-self: flex-end;
      transition: background var(--transition), transform var(--transition);
    }
    .lesson-card:hover .card-arrow {
      background: var(--color-accent);
      transform: translateX(2px);
    }
    .card-arrow svg {
      width: 14px;
      height: 14px;
      stroke: var(--color-accent);
      fill: none;
      transition: stroke var(--transition);
    }
    .lesson-card:hover .card-arrow svg { stroke: #1A1800; }

    /* ─── Modal Overlay ──────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: var(--color-overlay);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    /* ─── Modal Panel ────────────────────────────────────────── */
    .modal {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-modal);
      transform: translateY(16px) scale(0.97);
      transition: transform 0.22s ease;
      position: relative;
    }
    .modal-overlay.open .modal {
      transform: translateY(0) scale(1);
    }

    .modal-header {
      padding: 28px 28px 0;
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }
    .modal-icon-wrap {
      width: 52px;
      height: 52px;
      background: rgba(243, 230, 0, 0.14);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .modal-icon-wrap svg {
      width: 26px;
      height: 26px;
      fill: var(--color-accent);
    }
    .modal-meta { flex: 1; }
    .modal-module-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: 4px;
    }
    .modal-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--color-text);
      line-height: 1.3;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--color-surface-alt);
      border: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background var(--transition);
    }
    .modal-close:hover { background: var(--color-border); }
    .modal-close svg {
      width: 14px;
      height: 14px;
      stroke: var(--color-text-muted);
      fill: none;
    }

    .modal-body { padding: 20px 28px 28px; }
    .modal-description {
      font-size: 14px;
      color: var(--color-text-muted);
      line-height: 1.7;
      margin-bottom: 24px;
    }

    .modal-links { display: flex; flex-direction: column; gap: 10px; }
    .modal-link-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 18px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      transition: all var(--transition);
      text-decoration: none;
    }
    .modal-link-btn.primary {
      background: var(--color-accent);
      color: #1A1800;
    }
    .modal-link-btn.primary:hover {
      background: var(--color-accent-dark);
      text-decoration: none;
      transform: translateY(-1px);
    }
    .modal-link-btn.secondary {
      background: transparent;
      color: var(--color-text);
      border: 1px solid var(--color-border);
    }
    .modal-link-btn.secondary:hover {
      background: var(--color-surface-alt);
      text-decoration: none;
    }
    .modal-link-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
    .modal-link-btn.primary svg { stroke: #1A1800; fill: none; }
    .modal-link-btn.secondary svg { stroke: var(--color-text-muted); fill: none; }

    /* ─── Scrollbar ──────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 3px; }

    /* ─── Responsive ─────────────────────────────────────────── */
    @media (max-width: 600px) {
      .page { padding: 32px 20px 60px; }
      .page-heading { font-size: 24px; }
      .lessons-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .modal { border-radius: var(--radius-lg); }
    }
    @media (max-width: 400px) {
      .lessons-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

    section.className = 'module';
    section.innerHTML = `
      <div class="module-header">
        <span class="module-badge">Módulo ${mod.id}</span>
        <span class="module-title">${mod.title}</span>
        <div class="module-divider"></div>
      </div>
      <div class="lessons-grid" id="grid-${mod.id}"></div>
    `;
    container.appendChild(section);

    const grid = section.querySelector(`#grid-${mod.id}`);
    mod.lessons.forEach(lesson => {
      const card = document.createElement('div');
      card.className = 'lesson-card';
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', `Abrir ${lesson.title}`);
      card.innerHTML = `
        <div class="card-icon-wrap">${ICONS[lesson.icon]}</div>
        <div class="card-body">
          <p class="card-label">${lesson.aula}</p>
          <p class="card-title">${lesson.title}</p>
        </div>
        <div class="card-arrow">${ICONS.arrow}</div>
      `;
      card.addEventListener('click', () => openModal(mod, lesson));
      card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openModal(mod, lesson); });
      grid.appendChild(card);
    });
  });

  /* ─── Modal Logic ───────────────────────────────────────────── */
  const overlay  = document.getElementById('modal-overlay');
  const closeBtn = document.getElementById('modal-close');

  function openModal(mod, lesson) {
    document.getElementById('modal-icon').innerHTML = ICONS[lesson.icon];
    document.getElementById('modal-module-label').textContent = `Módulo ${mod.id} · ${lesson.aula}`;
    document.getElementById('modal-title').textContent = lesson.title;
    document.getElementById('modal-description').textContent = lesson.description;

    const linksEl = document.getElementById('modal-links');
    linksEl.innerHTML = '';
    lesson.links.forEach(l => {
      const a = document.createElement('a');
      a.href = l.href;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.className = `modal-link-btn ${l.type}`;
      a.innerHTML = `${ICONS[l.icon]} ${l.label}`;
      linksEl.appendChild(a);
    });

    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
    closeBtn.focus();
  }

  function closeModal() {
    overlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  closeBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
